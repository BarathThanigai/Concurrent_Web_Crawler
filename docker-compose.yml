services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_PATH: /app/data/crawler.db
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - webscope-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  webscope-data:
